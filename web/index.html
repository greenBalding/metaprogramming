<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metaprogramming Platform - Interactive Builder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            gap: 10px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .message.assistant .message-content {
            background: white;
            border: 1px solid #e0e0e0;
            color: #333;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message.system .message-content {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
            font-size: 13px;
            max-width: 100%;
        }

        .message.error .message-content {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ffcdd2;
            max-width: 100%;
        }

        .input-area {
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            background: white;
            display: flex;
            gap: 10px;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            gap: 8px;
        }

        input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status {
            font-size: 12px;
            color: #999;
            padding: 0 16px;
            height: 20px;
            display: flex;
            align-items: center;
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        code {
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 13px;
        }

        .project-info {
            background: #f0f4ff;
            border: 1px solid #d0deff;
            border-radius: 8px;
            padding: 12px;
            margin-top: 8px;
            font-size: 13px;
            color: #333;
        }

        .project-info strong {
            color: #667eea;
        }

        .init-message {
            text-align: center;
            color: #999;
            font-size: 14px;
            margin-top: auto;
            margin-bottom: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Metaprogramming Platform</h1>
            <p>Interactive AI-Guided Software Factory</p>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="init-message">
                <p>👋 Welcome! Describe the software you want to build.</p>
                <p style="margin-top: 10px; font-size: 12px; opacity: 0.7;">
                    Example: "I want to build a customer support portal for 5000 users on AWS"
                </p>
            </div>
        </div>

        <div class="status" id="status"></div>

        <div class="input-area">
            <div class="input-wrapper">
                <input 
                    type="text" 
                    id="messageInput" 
                    placeholder="Describe your project or answer a question..."
                    autocomplete="off"
                />
                <button id="sendBtn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const status = document.getElementById('status');

        let isLoading = false;
        let conversationId = Date.now().toString();
        let projectName = null;
        let projectData = {};

        // Clear init message on first interaction
        let firstMessage = true;

        function updateStatus(message, isLoading = false) {
            if (isLoading) {
                status.innerHTML = `<span class="spinner"></span>${message}`;
            } else {
                status.innerHTML = message;
            }
        }

        function addMessage(text, sender = 'assistant', isError = false) {
            if (firstMessage && sender === 'assistant') {
                chatArea.innerHTML = '';
                firstMessage = false;
            }

            const messageEl = document.createElement('div');
            messageEl.className = `message ${sender}`;
            if (isError) messageEl.classList.add('error');
            if (sender === 'system') messageEl.classList.add('system');

            const contentEl = document.createElement('div');
            contentEl.className = 'message-content';
            contentEl.innerHTML = escapeHtml(text).replace(/\n/g, '<br>');

            messageEl.appendChild(contentEl);
            chatArea.appendChild(messageEl);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || isLoading) return;

            messageInput.value = '';
            addMessage(message, 'user');
            isLoading = true;
            updateStatus('Processing...', true);
            sendBtn.disabled = true;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message,
                        conversationId,
                        projectName,
                        projectData
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();

                if (data.error) {
                    addMessage(data.error, 'assistant', true);
                } else {
                    addMessage(data.response, 'assistant');

                    if (data.projectName) {
                        projectName = data.projectName;
                        projectData = data.projectData || {};

                        if (data.projectGenerated) {
                            addMessage(
                                `✅ Project generated! 📁 Location: ${data.projectPath}`,
                                'system'
                            );
                        }
                    }

                    if (data.systemMessage) {
                        addMessage(data.systemMessage, 'system');
                    }
                }
            } catch (error) {
                addMessage(`Error: ${error.message}`, 'assistant', true);
            } finally {
                isLoading = false;
                updateStatus('');
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !isLoading) {
                sendMessage();
            }
        });

        // Initial greeting
        addMessage(
            "Hi! I'm your AI-guided software factory assistant.\n\n" +
            "Just describe what you want to build, and I'll:\n" +
            "• Ask clarifying questions\n" +
            "• Design the architecture\n" +
            "• Generate a complete project scaffold\n" +
            "• Create specs, backlog, and starter code\n\n" +
            "What would you like to build?",
            'assistant'
        );

        messageInput.focus();
    </script>
</body>
</html>
